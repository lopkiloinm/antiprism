<!DOCTYPE html>
<html>
<head>
    <title>Test Multi-Pass Compilation</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #log { background: #f5f5f5; padding: 10px; margin: 10px 0; white-space: pre-wrap; }
        #result { margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Test Multi-Pass LaTeX Compilation</h1>
    <button onclick="testCompilation()">Test Beamer Compilation</button>
    <div id="log"></div>
    <div id="result"></div>

    <script type="module">
        import { compileLatexToPdf } from './lib/latexCompiler.js';
        
        window.testCompilation = async function() {
            const logDiv = document.getElementById('log');
            const resultDiv = document.getElementById('result');
            
            logDiv.textContent = 'Starting multi-pass compilation test...\n';
            resultDiv.innerHTML = '';
            
            try {
                // Read the beamer template
                const response = await fetch('./public/templates/beamer/main.tex');
                const source = await response.text();
                
                logDiv.textContent += '✅ Loaded beamer template\n';
                logDiv.textContent += '🔄 Starting compilation with multi-pass enabled...\n';
                
                // Compile with multi-pass enabled (bibtex: true)
                const pdfBlob = await compileLatexToPdf(source, [], 'pdftex');
                
                logDiv.textContent += '✅ Multi-pass compilation successful!\n';
                
                // Display the PDF
                const pdfUrl = URL.createObjectURL(pdfBlob);
                resultDiv.innerHTML = `
                    <h3>Output PDF:</h3>
                    <iframe src="${pdfUrl}" width="100%" height="600px"></iframe>
                    <br><br>
                    <a href="${pdfUrl}" download="test-output.pdf">Download PDF</a>
                `;
                
            } catch (error) {
                logDiv.textContent += `❌ Compilation failed: ${error.message}\n`;
                logDiv.textContent += `Full error: ${error.stack || error}\n`;
            }
        };
    </script>
</body>
</html>
